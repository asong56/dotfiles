[buildPlans.IosevkaCustom]
family = "Iosevka Custom"
spacing = "term"
serifs = "sans"
noCvSs = true
exportGlyphNames = false

[buildPlans.IosevkaCustom.variants.design]
two = "curly-neck-serifless"
seven = "straight-serifless"
capital-g = "toothless-rounded-serifless-hooked"
capital-i = "serifed"
capital-j = "flat-hook-serifed"
capital-p = "closed-serifless"
capital-q = "curly-tailed"
a = "single-storey-earless-corner-serifed"
b = "toothless-corner-serifless"
d = "toothless-corner-serifless"
f = "flat-hook-serifless"
g = "single-storey-serifless"
i = "serifed"
p = "earless-corner-serifless"
q = "earless-corner-straight-serifless"
t = "flat-hook"
u = "toothed-serifless"
capital-eszet = "flat-top-serifless"
lower-eth = "straight-bar"
lower-delta = "rounded"
tittle = "round"
diacritic-dot = "round"
punctuation-dot = "round"
ellipsis-density = "normal"
asterisk = "hex-low"
brace = "curly"
ampersand = "flat-top"
dollar = "open"
cent = "open"
percent = "dots"
decorative-angle-brackets = "middle"
lig-ltgteq = "flat"
lig-equal-chain = "with-notch"
lig-hyphen-chain = "with-notch"
lig-plus-chain = "without-notch"
lig-double-arrow-bar = "without-notch"
lig-single-arrow-bar = "without-notch"

  [buildPlans.IosevkaCustom.ligations]
  inherits = "swift"

[buildPlans.IosevkaCustom.weights.Regular]
shape = 400
menu = 400
css = 400

[buildPlans.IosevkaCustom.weights.SemiBold]
shape = 600
menu = 600
css = 600

[buildPlans.IosevkaCustom.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.IosevkaCustom.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"
