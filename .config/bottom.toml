# ---------------------------------------------- #
[flags]

hide_avg_cpu = false
average_cpu_row = false

dot_marker = false
rate = "5s"

cpu_left_legend = false
current_usage = false
unnormalized_cpu = false

# Won't work if tree view is on
group_processes = true

case_sensitive = false
whole_word = false
regex = false

temperature_type = "c"

default_time_value = "300s"
time_delta = 15000
hide_time = false

default_widget_type = "proc"
default_widget_count = 1

expanded = false

basic = false
use_old_network_legend = false
table_gap = "space"

battery = true

disable_click = false
disable_keys = false

process_memory_as_value = true

tree = true

show_table_scroll_position = false
show_table_scroll_bar = false

process_command = false

network_use_binary_prefix = true
network_use_bytes = true
network_use_log = false

disable_advanced_kill = false
read_only = false

hide_k_threads = true
disable_gpu = false
enable_cache_memory = false

#free_arc = false

retention = "10m"

# none, top-left, top, top-right, left, right, bottom-left, bottom, bottom-right
memory_legend = "top-right"
network_legend = "top-right"



# ---------------------------------------------- #
[processes]

# PID, Name, CPU%, Mem%, R/s, W/s, T.Read, T.Write, User, State, Time, GMem%, GPU%, Nice, Priority
columns = ["PID", "Name", "CPU%", "Mem%", "GMem%", "GPU%", "Nice"]

get_threads = false



# ---------------------------------------------- #
[cpu]

# all, average/avg
default = "average"

show_decimal = false



# ---------------------------------------------- #
[disk]

# Disk, Mount, Used, Free, Total, Used%, Free%, R/s, W/s
columns = ["Mount", "Used%", "Free"]
default_sort = "Used%"


[disk.name_filter]

is_list_ignored = true
list = [
    "/dev/sda\\d+",
    "/dev/nvme0n1p2",
    "^/dev/disk", 
    "com.apple.os.update",
    "System Reserved", 
    "Recovery",
    "EFI"
]
regex = true
case_sensitive = false
whole_word = false


[disk.mount_filter]

is_list_ignored = true
list = [
    "/mnt/.*",
    "/boot",
    "^/System/Volumes/(VM|Preboot|Update|xarts|iSCPreboot|Hardware)",
    "^/dev",
    "/tmp"
]
regex = true
case_sensitive = false
whole_word = false



# ---------------------------------------------- #
[temperature]

# Temp, Temperature, Sensor
default_sort = "Temp"


[temperature.sensor_filter]

is_list_ignored = false
list = [
    "cpu",
    "gpu",
    "package",
    "core",
    "drive"
]
regex = false
case_sensitive = false
whole_word = false



# ---------------------------------------------- #
[network]


[network.interface_filter]

is_list_ignored = false
list = [
    "en0",
    "Wi-Fi",
    "Ethernet",
    "en[1-9]"
]
regex = true
case_sensitive = false
whole_word = false



